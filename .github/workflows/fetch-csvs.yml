name: Fetch CSVs from SharePoint

on:
  schedule:
    - cron: '0 6,12 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Historic CSV (MDR Exchange Hcsv.csv - app export)
        run: |
          curl -L \
            "https://mdrnet-my.sharepoint.com/:x:/g/personal/antwainjordan_mdr_net/IQCggNdhQBwfSrtLL96tia_8ARDIOb1NkuNe48M-yVR8P_U?download=1" \
            -H "User-Agent: Mozilla/5.0" \
            -o historic.csv \
            --fail --silent --show-error || echo "Warning: Historic CSV fetch failed"

      - name: Fetch Daily CSV (data.csv - PowerBI export)
        run: |
          curl -L \
            "https://mdrnet-my.sharepoint.com/:x:/g/personal/antwainjordan_mdr_net/IQCTpUaxwb1vRoPaPgWlcXMsAQrftKYIQ27G38BRhlh65-U?download=1" \
            -H "User-Agent: Mozilla/5.0" \
            -o daily.csv \
            --fail --silent --show-error || echo "Warning: Daily CSV fetch failed"

      - name: Verify files are not login pages
        run: |
          for f in historic.csv daily.csv; do
            if [ -f "$f" ]; then
              first=$(head -c 15 "$f")
              if [[ "$first" == "<!DOCTYPE"* ]] || [[ "$first" == "<html"* ]]; then
                echo "ERROR: $f is an HTML login page — removing"
                rm "$f"
              else
                echo "$f OK ($(wc -l < $f) lines)"
              fi
            else
              echo "WARNING: $f was not downloaded"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historic.csv daily.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update CSVs $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
